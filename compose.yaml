services:
  app:
    build: .
    ports:
      - "8080:8000"
    volumes:
      - invoice_processor_data:/app/data  # named volume (outside OneDrive sync)
    env_file:
      - .env
    restart: unless-stopped
    # Ollama on host: Podman auto-injects host.containers.internal → no extra_hosts needed
    # Docker Desktop: use host.docker.internal in LLM_URL instead
    # Docker on Linux: add extra_hosts: ["host.docker.internal:host-gateway"]

volumes:
  invoice_processor_data:
