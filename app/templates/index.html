<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invoice Processor – Lyfegen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <div class="header-left">
      <h1 class="app-title">Invoice Processor</h1>
      <p class="app-subtitle">E-banking compatible extraction & review</p>
    </div>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <span id="theme-icon">🌙</span>
      </button>
      <a class="btn btn-primary" href="/download/xml">
        <span class="btn-icon">⬇</span> Download pain.001 XML
      </a>
    </div>
  </div>
</header>

<main class="app-container">

<!-- Upload zone -->
<section class="upload-section">
  <div class="upload-card">
    <form id="upload-form" enctype="multipart/form-data" class="upload-form">
      <input type="file" id="file-input" name="files" accept=".pdf" multiple hidden>
      <label for="file-input" class="upload-target">
        <div class="upload-icon">📄</div>
        <h2 class="upload-title">Drop invoices here</h2>
        <p class="upload-hint">or <span class="upload-link">click to browse</span></p>
      </label>
    </form>
    <div id="upload-status" class="upload-feedback"></div>
    <div id="upload-progress-wrap" class="upload-progress-wrap" style="display:none">
      <div class="upload-progress-bar">
        <div id="upload-progress-fill" class="upload-progress-fill"></div>
      </div>
      <div id="upload-progress-text" class="upload-progress-text"></div>
    </div>
  </div>
</section>

<!-- Summary & Controls -->
<section class="controls-section">
  <div class="controls-bar">
    <div id="summary" class="summary-badge"></div>
    <div class="controls-actions">
      <input type="text" id="search-input" class="search-input" placeholder="🔍 Search invoices..." onkeyup="filterTable()">
      <button class="btn btn-secondary" onclick="retryAll()" title="Retry failed invoices">
        <span>↺</span> Retry errors
      </button>
      <button class="btn btn-ai" id="btn-run-ai" onclick="runAiAll()" style="display:none" title="Re-process script-flagged invoices with AI">
        <span>🤖</span> Run AI on all flagged
      </button>
      <button class="btn btn-secondary" id="btn-dev-fill" onclick="fillAllWithDevData()" title="[DEV] Auto-fill all incomplete invoices">
        <span>⚙️</span> [DEV] Fill all
      </button>
      <button class="btn btn-secondary" onclick="clearAllInvoices()" title="Delete all invoices">
        <span>🗑️</span> Clear all
      </button>
    </div>
  </div>
</section>

<!-- Dashboard table -->
<section class="table-section">
  <div class="table-wrapper">
    <table id="job-table" class="invoice-table">
      <thead>
        <tr>
          <th class="th-file" onclick="sortTable(0)">File</th>
          <th class="th-status" onclick="sortTable(1)">Status</th>
          <th class="th-invoice" onclick="sortTable(2)">Invoice ID</th>
          <th class="th-receiver" onclick="sortTable(3)">Receiver</th>
          <th class="th-amount" onclick="sortTable(4)">Amount</th>
          <th class="th-currency" onclick="sortTable(5)">Curr.</th>
          <th class="th-due" onclick="sortTable(6)">Due Date</th>
          <th class="th-iban" onclick="sortTable(7)">IBAN</th>
          <th class="th-notes" onclick="sortTable(8)">Notes</th>
          <th class="th-actions"></th>
        </tr>
      </thead>
      <tbody id="job-rows"></tbody>
    </table>
  </div>
</section>

</main>

<!-- Review / Edit modal -->
<dialog id="review-modal" class="review-modal">
  <div class="modal-inner">
    <div class="modal-pdf-pane">
      <iframe id="modal-pdf-frame" src="" title="Invoice PDF" class="modal-pdf"></iframe>
    </div>
    <div class="modal-form-pane">
      <div class="modal-header">
        <div>
          <h2 id="modal-title" class="modal-title">Review invoice</h2>
          <p id="modal-filename" class="modal-filename"></p>
        </div>
        <button class="btn-close" onclick="closeModal()" aria-label="Close">✕</button>
      </div>
      <div id="modal-reasons" class="modal-alert"></div>
      <form id="review-form" class="modal-form" onsubmit="submitReview(event)">
        <input type="hidden" id="modal-job-id" name="job_id">

        <fieldset class="form-fieldset">
          <legend class="form-legend">Invoice Details</legend>
          <div class="form-row">
            <div class="form-field">
              <label>Invoice ID</label>
              <input type="text" name="invoice_id" id="f-invoice-id" class="form-input">
            </div>
            <div class="form-field">
              <label>Receiver / Supplier</label>
              <input type="text" name="receiver" id="f-receiver" class="form-input">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>Amount</label>
              <input type="text" name="amount" id="f-amount" placeholder="e.g. 1234.56" class="form-input">
            </div>
            <div class="form-field">
              <label>Currency <span class="form-hint">(ISO 3-letter, e.g. CHF)</span></label>
              <input type="text" name="currency" id="f-currency" maxlength="3" class="form-input">
            </div>
          </div>
          <div class="form-field">
            <label>Due Date</label>
            <input type="text" name="due_date" id="f-due-date" placeholder="YYYY-MM-DD" class="form-input">
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">Payment Details</legend>
          <div class="form-field">
            <label>IBAN</label>
            <input type="text" name="iban" id="f-iban" placeholder="CH…" class="form-input">
          </div>
          <div class="form-field">
            <label>BIC / SWIFT</label>
            <input type="text" name="bic" id="f-bic" class="form-input">
          </div>
          <div class="form-field">
            <label>Reference / Payment Ref</label>
            <input type="text" name="reference" id="f-reference" class="form-input">
          </div>
        </fieldset>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="button" class="btn btn-secondary" id="btn-modal-dev-fill" onclick="fillCurrentWithDevData()" title="[DEV] Auto-fill missing fields">
            <span>⚙️</span> [DEV] Fill
          </button>
          <button type="submit" class="btn btn-primary">Save &amp; Mark Reviewed</button>
        </div>
      </form>
    </div>
  </div>
</dialog>

<script>
// ── Upload zone ────────────────────────────────────────────────────────────
const dropZone = document.querySelector('.upload-target');
const fileInput = document.getElementById('file-input');
const uploadForm = document.getElementById('upload-form');
let uploadingCount = 0;

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-active');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-active');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-active');
  uploadFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

async function uploadFiles(files) {
  const pdfFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (pdfFiles.length === 0) return;

  uploadingCount = pdfFiles.length;
  showUploadProgress();

  for (let i = 0; i < pdfFiles.length; i++) {
    const file = pdfFiles[i];
    const fd = new FormData();
    fd.append('files', file);

    try {
      const r = await fetch('/upload', { method: 'POST', body: fd });
      const data = await r.json();
      updateUploadProgress(i + 1, pdfFiles.length, data.queued.length);
    } catch (e) {
      console.error('Upload failed:', e);
      updateUploadProgress(i + 1, pdfFiles.length, 0);
    }
  }

  fileInput.value = '';
  hideUploadProgress();
  refreshJobs();
}

function showUploadProgress() {
  document.getElementById('upload-progress-wrap').style.display = 'block';
  document.getElementById('upload-status').textContent = '';
}

function updateUploadProgress(current, total, queued) {
  const pct = Math.round((current / total) * 100);
  document.getElementById('upload-progress-fill').style.width = pct + '%';
  document.getElementById('upload-progress-text').textContent = `${current} of ${total} uploaded`;
}

function hideUploadProgress() {
  setTimeout(() => {
    document.getElementById('upload-progress-wrap').style.display = 'none';
  }, 800);
}

// ── Polling ────────────────────────────────────────────────────────────────
let pollTimer = null;

async function refreshJobs() {
  const r = await fetch('/api/jobs');
  const jobs = await r.json();
  renderRows(jobs);
  updateSummary(jobs);
  const anyRunning = jobs.some(j => j.status === 'pending' || j.status === 'processing');
  if (anyRunning) {
    if (!pollTimer) pollTimer = setInterval(refreshJobs, 2000);
  } else {
    clearInterval(pollTimer); pollTimer = null;
  }
  const hasScriptReview = jobs.some(j => jobHasErrors(j) && isScript(j.ocr_method) && j.status === 'done');
  document.getElementById('btn-run-ai').style.display = hasScriptReview ? '' : 'none';
}

function isScript(method) {
  return !method || method === 'mdx' || method === 'mdx+qr';
}

function jobHasErrors(job) {
  if (!job.review_reasons) return false;
  return job.review_reasons.split(/;\s*/).some(f => f && flagSeverity(f) === 'err');
}

function jobHasWarnings(job) {
  if (!job.review_reasons) return false;
  return job.review_reasons.split(/;\s*/).some(f => f && flagSeverity(f) === 'warn');
}

function statusBadge(job) {
  if (job.status === 'done') {
    if (jobHasErrors(job)) {
      return `<button class="badge badge-review" onclick="openModal('${job.id}')" style="cursor:pointer;border:none;background:inherit;padding:0;font:inherit;">✗ Errors</button>`;
    }
    if (jobHasWarnings(job)) {
      return `<button class="badge badge-warn" onclick="openModal('${job.id}')" style="cursor:pointer;border:none;background:inherit;padding:0;font:inherit;">⚠ Warnings</button>`;
    }
  }
  const map = {
    pending:    '<span class="badge badge-pending">Waiting</span>',
    processing: '<span class="badge badge-processing">⟳ Processing…</span>',
    done:       '<span class="badge badge-done">✓ Complete</span>',
    error:      '<span class="badge badge-error">✗ Error</span>',
  };
  return map[job.status] || `<span class="badge">${job.status}</span>`;
}

const FLAG_ERR = new Set(['amount_not_found','receiver_not_found','due_date_not_found',
  'currency_not_found','no_payment_method','qr_scan_failed','reference_not_found']);
const FLAG_WARN = new Set(['invoice_id_not_found','iban_invalid_checksum',
  'iban_invalid_checksum_dev_skipped','iban_missing_bic','qr_iban_missing',
  'due_date_defaulted']);
const FLAG_LABELS = {
  amount_not_found: 'Amount missing',
  receiver_not_found: 'Receiver missing',
  due_date_not_found: 'Due date missing',
  due_date_defaulted: 'Due date estimated (end of month)',
  currency_not_found: 'Currency missing',
  no_payment_method: 'No payment method',
  qr_scan_failed: 'QR scan failed',
  reference_not_found: 'Reference missing',
  invoice_id_not_found: 'Invoice ID missing',
  iban_invalid_checksum: 'IBAN checksum invalid',
  iban_invalid_checksum_dev_skipped: 'IBAN suspicious',
  iban_missing_bic: 'BIC missing',
  qr_iban_missing: 'QR IBAN missing',
};

function flagSeverity(flag) {
  if (FLAG_ERR.has(flag) || flag.startsWith('llm_fallback_failed')) return 'err';
  if (FLAG_WARN.has(flag)) return 'warn';
  return 'info';
}

function flagLabel(flag) {
  if (FLAG_LABELS[flag]) return FLAG_LABELS[flag];
  if (flag.startsWith('llm_fallback_failed')) return 'AI fallback failed';
  return flag.replace(/_/g, ' ');
}

function methodLabel(method) {
  if (!method || method === 'mdx') return 'Script';
  if (method === 'mdx+qr') return 'Script+QR';
  if (method.endsWith('+qr')) return 'AI+QR';
  return 'AI';
}

function buildNotesCell(job) {
  const pills = [];
  if (job.ocr_method && (job.status === 'done' || job.status === 'error')) {
    pills.push(`<span class="flag-pill flag-info">${escHtml(methodLabel(job.ocr_method))}</span>`);
  }
  if (job.review_reasons) {
    for (const flag of job.review_reasons.split(/;\s*/)) {
      if (!flag) continue;
      pills.push(`<span class="flag-pill flag-${flagSeverity(flag)}">${escHtml(flagLabel(flag))}</span>`);
    }
  }
  if (job.status === 'error' && job.error_msg && !job.review_reasons) {
    pills.push(`<span class="flag-pill flag-err">⚠ ${escHtml(String(job.error_msg).slice(0, 50))}</span>`);
  }
  return pills.join('');
}

function rowActions(job) {
  let html = '';
  if (job.status === 'done' || job.status === 'error') {
    html += `<button class="btn-icon" title="Review &amp; edit" onclick="openModal('${job.id}')">✎</button> `;
  }
  if (jobHasErrors(job) && isScript(job.ocr_method) && job.status === 'done') {
    html += `<button class="btn-icon btn-ai-icon" title="Re-process with AI" onclick="queueLlm('${job.id}')">🤖</button> `;
  }
  if (job.status === 'error') {
    html += `<button class="btn-icon" title="Retry" onclick="retryJob('${job.id}')">↺</button> `;
  }
  html += `<button class="btn-icon btn-danger-icon" title="Delete" onclick="deleteJob('${job.id}')">✕</button>`;
  return html;
}

function renderRows(jobs) {
  const tbody = document.getElementById('job-rows');
  tbody.innerHTML = jobs.map(job => {
    const isReview = job.status === 'done' && job.needs_review === 'YES';
    const rowClass = isReview ? 'row-review' : (job.status === 'error' ? 'row-error' : (job.status === 'processing' ? 'row-processing' : ''));
    return `<tr class="invoice-row ${rowClass}">
      <td class="cell-file" title="${escHtml(job.filename)}">${escHtml(job.filename)}</td>
      <td class="cell-status">${statusBadge(job)}</td>
      <td class="cell-invoice">${escHtml(job.invoice_id || '')}</td>
      <td class="cell-receiver" title="${escHtml(job.receiver || '')}">${escHtml(job.receiver || '')}</td>
      <td class="cell-amount">${escHtml(job.amount || '')}</td>
      <td class="cell-currency">${escHtml(job.currency || '')}</td>
      <td class="cell-due">${escHtml(job.due_date || '')}</td>
      <td class="cell-iban">${escHtml(job.iban || '')}</td>
      <td class="cell-notes">${buildNotesCell(job)}</td>
      <td class="cell-actions">${rowActions(job)}</td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateSummary(jobs) {
  const done    = jobs.filter(j => j.status === 'done').length;
  const review  = jobs.filter(j => j.needs_review === 'YES').length;
  const err     = jobs.filter(j => j.status === 'error').length;
  const proc    = jobs.filter(j => j.status === 'processing' || j.status === 'pending').length;
  const total   = jobs.length;

  const parts = [];
  if (total > 0) parts.push(`<strong>${total}</strong> total`);
  if (done > 0) parts.push(`<strong>${done}</strong> done`);
  if (review > 0) parts.push(`<strong>${review}</strong> need review`);
  if (err > 0) parts.push(`<strong>${err}</strong> errors`);
  if (proc > 0) parts.push(`<strong>${proc}</strong> processing`);

  document.getElementById('summary').innerHTML = parts.join(' • ') || 'No invoices yet';
}

// ── Modal ──────────────────────────────────────────────────────────────────
const modal = document.getElementById('review-modal');
const FIELDS = ['invoice_id','receiver','amount','currency','due_date','iban','bic','reference'];
const FIELD_IDS = {
  invoice_id: 'f-invoice-id', receiver: 'f-receiver', amount: 'f-amount',
  currency: 'f-currency', due_date: 'f-due-date', iban: 'f-iban',
  bic: 'f-bic', reference: 'f-reference'
};

async function openModal(jobId) {
  const r = await fetch('/api/jobs');
  const jobs = await r.json();
  const job = jobs.find(j => j.id === jobId);
  if (!job) return;

  document.getElementById('modal-job-id').value = job.id;
  document.getElementById('modal-pdf-frame').src = `/api/pdf/${job.id}`;
  document.getElementById('modal-title').textContent =
    job.needs_review === 'YES' ? 'Review Invoice' : 'Edit Invoice';
  document.getElementById('modal-filename').textContent = job.filename;

  const reasonsEl = document.getElementById('modal-reasons');
  if (job.review_reasons) {
    const pills = job.review_reasons.split(/;\s*/).filter(Boolean).map(f => {
      const sev = flagSeverity(f);
      return `<span class="flag-pill flag-${sev}">${escHtml(flagLabel(f))}</span>`;
    }).join(' ');
    reasonsEl.innerHTML = pills;
    reasonsEl.style.display = 'block';
  } else {
    reasonsEl.style.display = 'none';
  }

  for (const f of FIELDS) {
    document.getElementById(FIELD_IDS[f]).value = job[f] || '';
  }
  modal.showModal();
}

function closeModal() {
  modal.close();
  document.getElementById('modal-pdf-frame').src = '';
}

modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

async function submitReview(e) {
  e.preventDefault();
  const jobId = document.getElementById('modal-job-id').value;
  const fd = new FormData(e.target);
  await fetch(`/api/review/${jobId}`, { method: 'POST', body: fd });
  closeModal();
  refreshJobs();
}

// ── Actions ────────────────────────────────────────────────────────────────
async function retryJob(id) {
  await fetch(`/process/${id}`, { method: 'POST' });
  refreshJobs();
}

async function retryAll() {
  await fetch('/process-all', { method: 'POST' });
  refreshJobs();
}

async function deleteJob(id) {
  if (!confirm('Remove this invoice?')) return;
  await fetch(`/jobs/${id}`, { method: 'DELETE' });
  refreshJobs();
}

async function clearAllInvoices() {
  if (!confirm('Delete ALL invoices? This cannot be undone.')) return;
  await fetch('/api/clear-all', { method: 'DELETE' });
  refreshJobs();
}

async function queueLlm(id) {
  await fetch(`/api/queue-llm/${id}`, { method: 'POST' });
  refreshJobs();
}

async function runAiAll() {
  const r = await fetch('/api/queue-llm-all', { method: 'POST' });
  const d = await r.json();
  document.getElementById('upload-status').textContent = `Queued ${d.queued} invoice(s) for AI processing.`;
  refreshJobs();
}

function _generateDevData(existingCurrency = null) {
  // Use detected currency if present, else default CHF (70% CHF, 30% EUR)
  const detectedCcy = existingCurrency || (Math.random() < 0.7 ? 'CHF' : 'EUR');

  const isSepa = detectedCcy === 'EUR';
  const isDomestic = detectedCcy === 'CHF';

  // Valid-format IBAN per currency zone
  let iban;
  if (isDomestic) {
    const bankCode = String(Math.floor(Math.random()*90000)+10000);
    const acct = Array.from({length:12}, ()=>Math.floor(Math.random()*10)).join('');
    iban = 'CH56' + bankCode + acct;  // 21-char valid CH IBAN
  } else if (isSepa) {
    iban = 'DE89' + Array.from({length:18}, ()=>Math.floor(Math.random()*10)).join('');
  } else {
    iban = 'GB29' + Array.from({length:18}, ()=>Math.floor(Math.random()*10)).join('');
  }

  // Real BIC prefixes by zone
  const bicPrefixes = isDomestic
    ? ['BLKB','KBSG','RAIF','UBSW','CRED']
    : isSepa
      ? ['DEUT','COBA','DKIB','INGA','HYVE']
      : ['BARC','HSBC','LLOY','NATW','RBOS'];
  const bicPrefix = bicPrefixes[Math.floor(Math.random()*bicPrefixes.length)];
  const bicCountry = isDomestic ? 'CH' : (isSepa ? 'DE' : 'GB');
  const bic = bicPrefix + bicCountry + '22';

  // Minimum required fields only
  return {
    invoice_id: 'INV-' + Math.random().toString(36).substring(2,10).toUpperCase(),
    receiver: ['Acme Corp','Global Tech Inc','Digital Solutions AG','Swift Finance Ltd'][Math.floor(Math.random()*4)],
    amount: (Math.random()*9000+100).toFixed(2),
    currency: detectedCcy,
    due_date: new Date(Date.now()+30*864e5).toISOString().slice(0,10),
    iban,
    bic,
    reference: 'RF' + String(Math.floor(Math.random()*90+10)) + Math.random().toString(36).substring(2,8).toUpperCase()
  };
}

async function fillCurrentWithDevData() {
  if (!modal.open) {
    alert('[DEV] Open an invoice modal first');
    return;
  }
  if (!confirm('[DEV] Auto-fill missing fields and save?')) return;

  const existingCurrency = document.getElementById('f-currency').value || null;
  const devData = _generateDevData(existingCurrency);
  for (const field in devData) {
    const input = document.getElementById(`f-${field.replace(/_/g, '-')}`);
    if (input) input.value = devData[field];
  }

  const jobId = document.getElementById('modal-job-id').value;
  const fd = new FormData();
  for (const [k, v] of Object.entries(devData)) {
    fd.append(k, v);
  }
  await fetch(`/api/review/${jobId}`, { method: 'POST', body: fd });
  closeModal();
  refreshJobs();
}

async function fillAllWithDevData() {
  if (!confirm('[DEV] Auto-fill and save all incomplete invoices?')) return;
  const r = await fetch('/api/jobs');
  const jobs = await r.json();
  const incomplete = jobs.filter(j => j.needs_review === 'YES' || !j.invoice_id || !j.amount || !j.currency);
  if (incomplete.length === 0) {
    alert('[DEV] No incomplete invoices found');
    return;
  }
  document.getElementById('upload-status').textContent = `Filling ${incomplete.length} invoice(s)...`;
  let saved = 0;
  for (const job of incomplete) {
    const existingCurrency = job.currency || null;
    const devData = _generateDevData(existingCurrency);
    const fd = new FormData();
    for (const [k, v] of Object.entries(devData)) {
      fd.append(k, v);
    }
    try {
      await fetch(`/api/review/${job.id}`, { method: 'POST', body: fd });
      saved++;
    } catch (e) {
      console.error(`Failed to fill ${job.id}:`, e);
    }
  }
  document.getElementById('upload-status').textContent = `Filled and saved ${saved}/${incomplete.length} invoice(s)`;
  refreshJobs();
}

function filterTable() {
  const input = document.getElementById('search-input');
  const filter = input.value.toUpperCase();
  const table = document.getElementById('job-table');
  const rows = table.querySelectorAll('tbody tr');

  rows.forEach(row => {
    const text = row.textContent.toUpperCase();
    if (text.includes(filter)) {
      row.classList.remove('hidden');
    } else {
      row.classList.add('hidden');
    }
  });
}

function sortTable(colIndex) {
  const table = document.getElementById('job-table');
  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr:not(.hidden)'));
  const th = table.querySelectorAll('thead th')[colIndex];

  // Check if already sorted by this column
  const isAsc = th.classList.contains('sort-asc');
  table.querySelectorAll('thead th').forEach(h => {
    h.classList.remove('sort-asc', 'sort-desc');
  });

  rows.sort((a, b) => {
    const aVal = a.querySelectorAll('td')[colIndex]?.textContent.trim() || '';
    const bVal = b.querySelectorAll('td')[colIndex]?.textContent.trim() || '';
    const cmp = aVal.localeCompare(bVal, undefined, {numeric: true});
    return isAsc ? -cmp : cmp;
  });

  th.classList.add(isAsc ? 'sort-desc' : 'sort-asc');
  rows.forEach(row => tbody.appendChild(row));
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
}

// Initialize theme from localStorage
function initTheme() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
}

// Wait for DOM then init
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initTheme);
} else {
  initTheme();
}

// Initial load
refreshJobs();
</script>
</body>
