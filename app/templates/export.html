<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export — Bank Assignment</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── BANK COLUMNS ── */
    .bank-col {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .bank-col:last-child { border-right: none; }

    .bank-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .bank-header .bank-name {
      font-size: 13px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    }
    .bank-header .bank-meta {
      font-size: 11px; color: var(--text-dim); margin-top: 3px;
    }
    .bank-header .bank-total {
      font-size: 18px; font-weight: 700; margin-top: 6px;
    }

    .col-bkb .bank-header { border-top: 3px solid #22BAA0; }
    .col-raiff .bank-header { border-top: 3px solid #22BAA0; }
    .col-unsorted .bank-header { border-top: 3px solid var(--amber); }

    .drop-zone {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background .15s;
    }
    .drop-zone.drag-over {
      background: rgba(34,186,160,.06);
      outline: 2px dashed var(--accent);
      outline-offset: -4px;
      border-radius: 4px;
    }

    /* ── INVOICE CARD ── */
    .invoice-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px;
      cursor: grab;
      user-select: none;
      transition: box-shadow .15s, transform .1s;
      position: relative;
    }
    .invoice-card:hover { box-shadow: 0 0 0 1px var(--accent); }
    .invoice-card.dragging { opacity: .4; transform: scale(.97); }
    .invoice-card.locked {
      opacity: .5;
      cursor: default;
      border-style: dashed;
    }
    .invoice-card.locked:hover { box-shadow: none; }
    .card-lock { font-size: 11px; margin-left: auto; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-receiver { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .card-amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
    .card-bottom { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .card-currency {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--text-dim);
    }
    .card-status {
      font-size: 10px; color: var(--text-dim);
      margin-left: auto;
    }
    .card-open-btn {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; color: var(--text-dim);
      font-size: 14px; cursor: pointer; padding: 2px 4px; border-radius: 4px;
      opacity: 0; transition: opacity .15s;
    }
    .invoice-card:hover .card-open-btn { opacity: 1; }
    .card-open-btn:hover { background: var(--border); color: var(--text); }

    /* ── BOTTOM BAR ── */
    .bottombar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .bottombar .stats { font-size: 12px; color: var(--text-dim); }
    .bottombar .stats span { color: var(--text); font-weight: 600; }
    .bottombar .spacer { flex: 1; }
    .warn-badge {
      font-size: 12px; color: var(--amber);
      background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3);
      padding: 5px 12px; border-radius: 6px;
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
      border: none; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-success { background: var(--green); color: #fff; }

    /* ── BLOCKERS POPUP ── */
    .blockers-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .blockers-popup.show {
      opacity: 1;
      pointer-events: all;
    }
    .blockers-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .blockers-box h2 {
      font-size: 15px;
      margin-bottom: 16px;
      color: var(--red);
    }
    .blockers-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .blocker-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
    }
    .blocker-item .filename {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .blocker-item .reason {
      color: var(--text-dim);
      margin: 2px 0;
    }
    .blockers-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <h1>Export — Bank Assignment</h1>
  <span class="badge" id="invoice-count"></span>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="window.location='/'">← Back to Dashboard</button>
</div>

<!-- THREE-COLUMN DRAG BOARD -->
<div class="main">

  <!-- BKB -->
  <div class="bank-col col-bkb">
    <div class="bank-header">
      <div class="bank-name">BKB</div>
      <div class="bank-meta">CHF · SEK · EUR</div>
      <div class="bank-total" id="bkb-total">—</div>
    </div>
    <div class="drop-zone" id="zone-bkb" ondragover="onDragOver(event)" ondrop="onDrop(event,'BKB')" ondragleave="onDragLeave(event)">
    </div>
  </div>

  <!-- RAIFFEISEN -->
  <div class="bank-col col-raiff">
    <div class="bank-header">
      <div class="bank-name">Raiffeisen</div>
      <div class="bank-meta">USD · CAD · GBP</div>
      <div class="bank-total" id="raiff-total">—</div>
    </div>
    <div class="drop-zone" id="zone-raiff" ondragover="onDragOver(event)" ondrop="onDrop(event,'RAIFFEISEN')" ondragleave="onDragLeave(event)">
    </div>
  </div>

  <!-- MANUAL/UNSORTED -->
  <div class="bank-col col-unsorted">
    <div class="bank-header">
      <div class="bank-name">Unsorted</div>
      <div class="bank-meta">Needs manual assignment</div>
      <div class="bank-total" id="unsorted-count">—</div>
    </div>
    <div class="drop-zone" id="zone-unsorted" ondragover="onDragOver(event)" ondrop="onDrop(event,'MANUAL')" ondragleave="onDragLeave(event)">
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="stats">
    BKB: <span id="stat-bkb">0</span> &nbsp;·&nbsp;
    Raiffeisen: <span id="stat-raiff">0</span> &nbsp;·&nbsp;
    Unsorted: <span id="stat-unsorted">0</span>
  </div>
  <div class="spacer"></div>
  <div class="warn-badge" id="unsorted-warn" style="display:none;"></div>
  <button class="btn btn-success" id="download-btn" onclick="acceptAndDownload()">✓ Accept &amp; Download</button>
</div>

<!-- EDIT MODAL (shared partial) -->
{% include 'partials/modal_edit.html' %}

<!-- BLOCKERS POPUP -->
<div class="blockers-popup" id="blockers-popup">
  <div class="blockers-box">
    <h2>⚠ Cannot export — incomplete invoices</h2>
    <div class="blockers-list" id="blockers-list"></div>
    <div class="blockers-footer">
      <button class="btn btn-ghost" onclick="closeBlockersPopup()">Close &amp; Fix</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="/static/js/modal.js"></script>
<script src="/static/js/export.js"></script>

</body>
</html>
